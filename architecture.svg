<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <style>
      .box { fill: white; stroke: black; stroke-width: 2; }
      .txt { font-family: Arial, sans-serif; font-size: 18px; text-anchor: middle; dominant-baseline: middle; }
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: black; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="40" class="title">Architecture du projet TCG</text>

  <!-- Main vertical flow -->
  <rect x="365" y="70" width="170" height="40" class="box"/>
  <text x="450" y="90" class="txt">utilisateur</text>

  <line x1="450" y1="110" x2="450" y2="150" class="arrow"/>

  <rect x="365" y="150" width="170" height="40" class="box"/>
  <text x="450" y="170" class="txt">index.html</text>

  <!-- side resources -->
  <rect x="630" y="150" width="150" height="40" class="box"/>
  <text x="705" y="170" class="txt">style.css</text>
  <line x1="630" y1="170" x2="535" y2="170" class="arrow"/>

  <rect x="120" y="150" width="150" height="40" class="box"/>
  <text x="195" y="170" class="txt">Cartes/*.jpeg</text>
  <line x1="270" y1="170" x2="365" y2="170" class="arrow"/>

  <line x1="450" y1="190" x2="450" y2="240" class="arrow"/>

  <rect x="365" y="240" width="170" height="40" class="box"/>
  <text x="450" y="260" class="txt">script.js</text>

  <!-- API row -->
  <line x1="450" y1="280" x2="450" y2="330" class="arrow"/>

  <rect x="100" y="330" width="170" height="40" class="box"/>
  <text x="185" y="350" class="txt">state.php</text>

  <rect x="365" y="330" width="170" height="40" class="box"/>
  <text x="450" y="350" class="txt">play.php</text>

  <rect x="630" y="330" width="170" height="40" class="box"/>
  <text x="715" y="350" class="txt">reset.php</text>

  <line x1="450" y1="280" x2="185" y2="330" class="arrow"/>
  <line x1="450" y1="280" x2="450" y2="330" class="arrow"/>
  <line x1="450" y1="280" x2="715" y2="330" class="arrow"/>

  <!-- game.php -->
  <line x1="185" y1="370" x2="185" y2="430" class="arrow"/>
  <line x1="450" y1="370" x2="450" y2="430" class="arrow"/>
  <line x1="715" y1="370" x2="715" y2="430" class="arrow"/>

  <line x1="185" y1="430" x2="450" y2="430" class="arrow"/>
  <line x1="715" y1="430" x2="450" y2="430" class="arrow"/>

  <rect x="365" y="430" width="170" height="40" class="box"/>
  <text x="450" y="450" class="txt">game.php</text>

  <line x1="450" y1="470" x2="450" y2="540" class="arrow"/>

  <rect x="365" y="540" width="170" height="40" class="box"/>
  <text x="450" y="560" class="txt">data/game.json</text>

  <!-- note -->
  <text x="450" y="640" style="font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle;">
    script.js appelle les fichiers PHP
  </text>
  <text x="450" y="665" style="font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle;">
    game.php gère les règles du jeu
  </text>
  <text x="450" y="690" style="font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle;">
    data/game.json sauvegarde l'état de la partie
  </text>
</svg>
